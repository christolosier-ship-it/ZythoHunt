<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZythoHunt — Prototype V0.1.1</title>
    <link rel="stylesheet" href="./styles/tokens.css">
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/layout.css">
    <link rel="stylesheet" href="./styles/map.css">
  </head>
  <body>
    <header>
      <div>
        <h1>ZythoHunt</h1>
        <p>Prototype V0.1.1 — « Buvez-les toutes. »</p>
      </div>
      <div class="versions">
        <span id="app-version">App 0.1.1</span>
        <span id="taxonomy-version">Taxonomie 0.1.1-prototype.2</span>
      </div>
    </header>
    <main>
      <section class="map-shell" aria-label="Zythosphère">
        <p id="status" role="status"></p>
        <svg viewBox="0 0 2400 1800" aria-label="Zythosphère prototype">
          <g class="map-viewport"><g class="map-links"></g><g class="map-nodes"></g></g>
        </svg>
        <nav class="map-controls" aria-label="Contrôles de carte">
          <button id="zoom-in" aria-label="Zoom avant">+</button>
          <button id="zoom-out" aria-label="Zoom arrière">−</button>
          <button id="recenter">Recentrer</button>
          <button id="fit">Vue générale</button>
        </nav>
      </section>
      <section class="legend" aria-label="Légende"><span class="dot structure"></span>Nœud structurel <span class="dot style"></span>Style découvert <span class="line primary"></span>Lien principal <span class="line secondary"></span>Lien secondaire</section>
      <div id="debug-root"></div>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
