name: Validate and deploy ZythoHunt

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          corepack enable
          corepack prepare pnpm@10.12.4 --activate
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck > typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: remaining-typecheck-diagnostics
          path: typecheck.log
      - run: pnpm test
      - run: pnpm build
        env:
          BASE_PATH: /ZythoHunt-Reveal-Lab/
